name: MeerkatWatch
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: 2
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.meerkatwatch
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  MeerkatWatch:
    type: application
    platform: iOS
    sources: [MeerkatWatch]
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: MeerkatWatch/Info.plist
        PRODUCT_NAME: MeerkatWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MeerkatWatch/Info.plist
      properties:
        CFBundleName: "ミーアキャットの見張り隊"
        CFBundleDisplayName: "ミーアキャットの見張り隊"
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Light
        NSUserTrackingUsageDescription: "広告の表示と効果測定のために使用します。許可しない場合もアプリはそのまま使えます。"
        GADApplicationIdentifier: "ca-app-pub-9404799280370656~8275915187"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: "cstr6suwn9.skadnetwork"
          - SKAdNetworkIdentifier: "4fzdc2evr5.skadnetwork"
          - SKAdNetworkIdentifier: "2fnua5tdw4.skadnetwork"
          - SKAdNetworkIdentifier: "ydx93a7ass.skadnetwork"
