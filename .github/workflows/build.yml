name: Build and Upload to App Store

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Install Python dependencies
      run: pip3 install --break-system-packages PyJWT cryptography requests

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 0 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml
        echo "Build number: $BUILD_NUM"

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Prepare signing keychain
      env:
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

    - name: Create CI distribution certificate
      env:
        ASC_KEY_ID: WDXGY9WX55
        ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        BUILD_KEYCHAIN: build.keychain
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: python3 scripts/create_distribution_certificate.py

    - name: Prepare App Store provisioning profile
      env:
        ASC_KEY_ID: WDXGY9WX55
        ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        APP_BUNDLE_ID: com.tokyonasu.meerkatwatch
        PROFILE_NAME: "MeerkatWatch App Store"
        REFRESH_PROFILE: "true"
      run: python3 scripts/prepare_app_store_profile.py

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme MeerkatWatch \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/MeerkatWatch.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          PROVISIONING_PROFILE_SPECIFIER="MeerkatWatch App Store" \
          PRODUCT_BUNDLE_IDENTIFIER=com.tokyonasu.meerkatwatch \
          CURRENT_PROJECT_VERSION="${{ env.BUILD_NUM }}" \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        /usr/libexec/PlistBuddy -c "Set :signingStyle manual" export_options.plist
        /usr/libexec/PlistBuddy -c "Delete :provisioningProfiles" export_options.plist || true
        /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" export_options.plist
        /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.tokyonasu.meerkatwatch string MeerkatWatch App Store" export_options.plist
        xcodebuild -exportArchive \
          -archivePath build/MeerkatWatch.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec
        ls -la build/export/*.ipa

    - name: Upload IPA
      run: |
        IPA_PATH=$(ls build/export/*.ipa | head -1)
        echo "Uploading: $IPA_PATH"
        API_PRIVATE_KEYS_DIR="$HOME/.appstoreconnect/private_keys" \
        xcrun altool --upload-app \
          --file "$IPA_PATH" \
          --type ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec \
          --output-format xml 2>&1 | tee /tmp/meerkatwatch-altool-upload.log
        if grep -Eqi 'UPLOAD FAILED|Validation failed|STATE_ERROR|ERROR:' /tmp/meerkatwatch-altool-upload.log; then
          exit 1
        fi

    - name: Submit for Review
      env:
        APP_VERSION: "1.2"
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }}
